openapi: "3.1.0"
info:
  title: SmartHire Backend API
  description: |
    Internal recruitment management platform API.
    All endpoints require a valid JWT bearer token except `/prescreen/**`, `/health`, `/docs`, and `/openapi.json`.
  version: "1.0.0"
  contact:
    name: SmartHire Platform Team

servers:
  - url: "http://localhost:8083"
    description: Local development
  - url: "https://smarthire.internal"
    description: Production

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ResponseDto:
      type: object
      properties:
        response:
          type: array
          items: {}
        message:
          type: string
        exception:
          type: string
          nullable: true
        result:
          type: string
          nullable: true
      required:
        - response
        - message

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseDto"
        - type: object
          properties:
            exception:
              type: string

    # -------------------------------------------------------------------------
    # Auth
    # -------------------------------------------------------------------------
    ValidateSessionRequest:
      type: object
      required: [userName]
      properties:
        userName:
          type: string
          example: "jdoe@example.com"

    # -------------------------------------------------------------------------
    # Candidate
    # -------------------------------------------------------------------------
    CandidateDataRequest:
      type: object
      required: [candidateName]
      properties:
        candidateName:
          type: string
        emailId:
          type: string
          format: email
        mobileNumber:
          type: string
        currentCompany:
          type: string
        currentLocation:
          type: string
        totalExp:
          type: number
          format: float
          minimum: 0
          maximum: 60
        relevantExp:
          type: number
          format: float
        currentCtc:
          type: number
          format: double
        noticePeriod:
          type: string
        accountId:
          type: integer
          format: int64
        region:
          type: string
        recvdDate:
          type: string
          format: date
        isReferral:
          type: boolean
          default: false
        referrerName:
          type: string
        isRehire:
          type: boolean
          default: false
        prescreenId:
          type: string
        technologyId:
          type: integer
          format: int64
        towerId:
          type: integer
          format: int64
        practiceId:
          type: integer
          format: int64

    CandidateSearchRequest:
      type: object
      properties:
        skill:
          type: integer
          format: int64
          description: technology_master id
        status:
          type: integer
          format: int64
          description: status_master id
        tower:
          type: integer
          format: int64
        source:
          type: integer
          format: int64
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        page:
          type: integer
          default: 0
        size:
          type: integer
          default: 20
          maximum: 200

    SkillDLRequest:
      type: object
      required: [technologyId, dlEmail]
      properties:
        technologyId:
          type: integer
          format: int64
        dlEmail:
          type: string
          format: email

    # -------------------------------------------------------------------------
    # Interviewer Calendar
    # -------------------------------------------------------------------------
    FreeSlotRequest:
      type: object
      required: [interviewerId, interviewDate, startTime, interviewTypeId, technologyId]
      properties:
        interviewerId:
          type: integer
          format: int64
        interviewDate:
          type: string
          format: date
        startTime:
          type: string
          example: "10:00"
        interviewTypeId:
          type: integer
          format: int64
        technologyId:
          type: integer
          format: int64
        accountId:
          type: integer
          format: int64
        buId:
          type: integer
          format: int64
        participationType:
          type: string
          enum: [Virtual, In-person]

    InterviewSlotRequest:
      type: object
      required: [interviewerCalendarId, candidateId, recruiterId]
      properties:
        interviewerCalendarId:
          type: integer
          format: int64
        candidateId:
          type: integer
          format: int64
        recruiterId:
          type: integer
          format: int64
        interviewTypeId:
          type: integer
          format: int64

    FeedbackRequest:
      type: object
      required: [interviewerCalendarId, feedbackStatus, responseJson]
      properties:
        interviewerCalendarId:
          type: integer
          format: int64
        feedbackStatus:
          type: string
          enum: [Select, Reject, "On Hold", "L1 FB NA", "L2 FB NA", "L3 FB NA"]
        rating:
          type: integer
          minimum: 1
          maximum: 5
        responseJson:
          type: object
          additionalProperties: true

    RescheduleRequest:
      type: object
      required: [interviewerCalendarId, newDate, newStartTime]
      properties:
        interviewerCalendarId:
          type: integer
          format: int64
        newDate:
          type: string
          format: date
        newStartTime:
          type: string
          example: "14:00"

    # -------------------------------------------------------------------------
    # Feedback Form
    # -------------------------------------------------------------------------
    FeedbackFormCreateRequest:
      type: object
      required: [templateName, technologyId, nodes]
      properties:
        templateName:
          type: string
        technologyId:
          type: integer
          format: int64
        practiceId:
          type: integer
          format: int64
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackFormNode"

    FeedbackFormNode:
      type: object
      required: [heading]
      properties:
        heading:
          type: string
        parentId:
          type: integer
          format: int64
          nullable: true
        dataTypeId:
          type: integer
          format: int64
        requiredFlag:
          type: boolean
          default: false
        orderIndex:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackFormNode"

    FeedbackFormHeadingsRequest:
      type: object
      required: [technologyId]
      properties:
        technologyId:
          type: integer
          format: int64
        practiceId:
          type: integer
          format: int64

    # -------------------------------------------------------------------------
    # User / Employee
    # -------------------------------------------------------------------------
    RegisterUserRequest:
      type: object
      required: [employeeId, firstName, emailId, gradeId, buId, roleIds]
      properties:
        employeeId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        emailId:
          type: string
          format: email
        gradeId:
          type: integer
          format: int64
        buId:
          type: integer
          format: int64
        practiceId:
          type: integer
          format: int64
        supervisorEmail:
          type: string
          format: email
        roleIds:
          type: array
          items:
            type: integer
            format: int64
        technologyIds:
          type: array
          items:
            type: integer
            format: int64
        accountIds:
          type: array
          items:
            type: integer
            format: int64

    UpdateRoleRequest:
      type: object
      required: [emailId, roleIds]
      properties:
        emailId:
          type: string
          format: email
        roleIds:
          type: array
          items:
            type: integer
            format: int64

    # -------------------------------------------------------------------------
    # Lookup
    # -------------------------------------------------------------------------
    LookupRequest:
      type: object
      properties:
        screenId:
          type: string

    MarketUnitRequest:
      type: object
      required: [buId]
      properties:
        buId:
          type: integer
          format: int64

    # -------------------------------------------------------------------------
    # Reports
    # -------------------------------------------------------------------------
    ReportFilterRequest:
      type: object
      properties:
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        technologyId:
          type: integer
          format: int64
        buId:
          type: integer
          format: int64
        accountId:
          type: integer
          format: int64
        interviewTypeId:
          type: integer
          format: int64

    # -------------------------------------------------------------------------
    # Prescreen
    # -------------------------------------------------------------------------
    # No request body — query params only

    # -------------------------------------------------------------------------
    # Teams Meeting
    # -------------------------------------------------------------------------
    MeetingLinkRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: OAuth2 authorization code from /getCode redirect

    MeetingInviteRequest:
      type: object
      required: [candidateId, interviewerCalendarId]
      properties:
        candidateId:
          type: integer
          format: int64
        interviewerCalendarId:
          type: integer
          format: int64
        subject:
          type: string
        attendeeEmails:
          type: array
          items:
            type: string
            format: email

    # -------------------------------------------------------------------------
    # Keycloak
    # -------------------------------------------------------------------------
    KeycloakTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        userId:
          type: string

paths:
  # ===========================================================================
  # Health (public)
  # ===========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Auth / Session
  # ===========================================================================
  /login/validateSession:
    post:
      tags: [Auth]
      summary: Validate Keycloak session and enforce single-session policy
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateSessionRequest"
      responses:
        "200":
          description: Session validated or duplicate sessions terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Prescreen (PUBLIC — no auth)
  # ===========================================================================
  /prescreen/updatePrescreenDetails:
    get:
      tags: [Prescreen]
      summary: Update prescreen record (public endpoint for external systems)
      security: []
      parameters:
        - name: prescreenId
          in: query
          required: true
          schema:
            type: string
        - name: recruiterEmailId
          in: query
          required: true
          schema:
            type: string
            format: email
        - name: recruiterName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prescreen record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Candidate Data
  # ===========================================================================
  /candidateData/saveCandidateData:
    post:
      tags: [Candidate]
      summary: Create or update a candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateDataRequest"
      responses:
        "200":
          description: Candidate saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /candidateData/getCandidateData:
    post:
      tags: [Candidate]
      summary: Search and filter candidates with pagination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateSearchRequest"
      responses:
        "200":
          description: Paginated candidate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /candidateData/saveSkillDL:
    post:
      tags: [Candidate]
      summary: Map a skill/technology to a distribution list email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillDLRequest"
      responses:
        "200":
          description: Mapping saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /candidateData/createNewEntry:
    post:
      tags: [Candidate]
      summary: Create a candidate entry with a new skill not previously in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateDataRequest"
      responses:
        "200":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Interviewer
  # ===========================================================================
  /interviewer/getInterviewerSlots:
    post:
      tags: [Interviewer]
      summary: Retrieve available interviewer slots by skill, date range, and BU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                technologyId:
                  type: integer
                  format: int64
                fromDate:
                  type: string
                  format: date
                toDate:
                  type: string
                  format: date
                buId:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Available interviewer slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /interviewer/saveFreeSlot:
    post:
      tags: [Interviewer]
      summary: Register an interviewer's availability slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeSlotRequest"
      responses:
        "200":
          description: Free slot saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /interviewer/saveInterviewSlot:
    post:
      tags: [Interviewer]
      summary: Book an interview slot (link candidate to interviewer slot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewSlotRequest"
      responses:
        "200":
          description: Slot booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /interviewer/saveFeedback:
    post:
      tags: [Interviewer]
      summary: Submit interview feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Feedback saved; PDF generation triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /interviewer/rescheduledRequest:
    post:
      tags: [Interviewer]
      summary: Reschedule an interview slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleRequest"
      responses:
        "200":
          description: Slot rescheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /interviewer/deleteSlot:
    delete:
      tags: [Interviewer]
      summary: Cancel / delete an interview slot
      parameters:
        - name: interviewerCalendarId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Recruiter
  # ===========================================================================
  /recruiter/getDirectRecruiterSlots:
    post:
      tags: [Recruiter]
      summary: Retrieve interview slots for a recruiter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recruiterEmail:
                  type: string
                  format: email
                month:
                  type: integer
                year:
                  type: integer
      responses:
        "200":
          description: Recruiter slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /recruiter/saveInterviewSlot:
    post:
      tags: [Recruiter]
      summary: Book a direct interview slot (without prior availability slot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewSlotRequest"
      responses:
        "200":
          description: Slot booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /recruiter/rescheduleSlot:
    post:
      tags: [Recruiter]
      summary: Reschedule a recruiter-created interview slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleRequest"
      responses:
        "200":
          description: Slot rescheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /recruiter/deleteSlot:
    post:
      tags: [Recruiter]
      summary: Delete a recruiter-created interview slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recruiterCalendarId]
              properties:
                recruiterCalendarId:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Slot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /recruiter/feedbackForm:
    post:
      tags: [Recruiter]
      summary: Retrieve feedback form for a specific interview slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interviewerCalendarId]
              properties:
                interviewerCalendarId:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Feedback form data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /recruiter/feedbackFormPDF:
    post:
      tags: [Recruiter]
      summary: Generate or retrieve the PDF feedback report for an interview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interviewerCalendarId]
              properties:
                interviewerCalendarId:
                  type: integer
                  format: int64
      responses:
        "200":
          description: PDF URL or file stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Slot Bulk Upload
  # ===========================================================================
  /slot/panelSlotUpload:
    post:
      tags: [Slot]
      summary: Bulk upload interviewer panel slots via Excel file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, createdBy]
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel (.xlsx) file with slot data
                createdBy:
                  type: string
                  format: email
      responses:
        "200":
          description: Upload result with row-level error details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Feedback Forms
  # ===========================================================================
  /feedbackForm/addFeedbackForm:
    post:
      tags: [FeedbackForm]
      summary: Create or update a feedback form template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackFormCreateRequest"
      responses:
        "200":
          description: Template saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /feedbackForm/getFeedbackFormHeadings:
    post:
      tags: [FeedbackForm]
      summary: Retrieve active hierarchical feedback form for a technology and practice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackFormHeadingsRequest"
      responses:
        "200":
          description: Feedback form hierarchy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Reports
  # ===========================================================================
  /report/generateReport:
    put:
      tags: [Reports]
      summary: Generate an Excel pipeline report with filters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFilterRequest"
      responses:
        "200":
          description: Excel file stream
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /report/generatePdf:
    get:
      tags: [Reports]
      summary: Generate PDF feedback report for a specific interview
      parameters:
        - name: interviewerCalendarId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: PDF file stream or S3 URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  # ===========================================================================
  # Excel Downloads
  # ===========================================================================
  /downloadExcel/exportExcel:
    post:
      tags: [Reports]
      summary: Download main candidate pipeline Excel report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFilterRequest"
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /downloadExcel/exportExcelPMO:
    post:
      tags: [Reports]
      summary: Download PMO demand report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFilterRequest"
      responses:
        "200":
          description: PMO Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /downloadExcel/exportExcelL2AgingReport:
    post:
      tags: [Reports]
      summary: Download L2 aging report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFilterRequest"
      responses:
        "200":
          description: L2 aging Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  # ===========================================================================
  # Lookup / Master Data
  # ===========================================================================
  /lookup/fetchDropdown:
    post:
      tags: [Lookup]
      summary: Fetch dropdown values for a given screen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupRequest"
      responses:
        "200":
          description: Dropdown items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/fetchMarketUnit:
    post:
      tags: [Lookup]
      summary: Fetch market units for a BU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketUnitRequest"
      responses:
        "200":
          description: Market units
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/fetchPractices:
    post:
      tags: [Lookup]
      summary: Fetch practices
      responses:
        "200":
          description: Practice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/skills:
    get:
      tags: [Lookup]
      summary: Fetch all active technologies / skills
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/grade:
    get:
      tags: [Lookup]
      summary: Fetch all grades
      responses:
        "200":
          description: Grade list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/locations:
    get:
      tags: [Lookup]
      summary: Fetch all locations
      responses:
        "200":
          description: Location list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/roles:
    get:
      tags: [Lookup]
      summary: Fetch all application roles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/getRejectionReasons:
    get:
      tags: [Lookup]
      summary: Fetch rejection reason master data
      responses:
        "200":
          description: Rejection reasons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /lookup/getDeclineReasons:
    get:
      tags: [Lookup]
      summary: Fetch offer decline reason master data
      responses:
        "200":
          description: Decline reasons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDto"

  /configuration/constants:
    get:
      tags: [Configuration]
      summary: Fetch runtime configuration constants
      responses:
        "200":
          description: Configuration values (slotDuration, fromTime, toTime, locale)
          content:
            application/json:
              schema:
